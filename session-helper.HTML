<script>
  var BASE = 'https://script.google.com/macros/s/AKfycby-HCCJCr8TUeN08F7Ks8I9pmlVjPFBe4joT4-JhTeb/dev';

  function _redirect(url) {
    var parts = url.split('?');
    var base = parts[0];
    var params = parts[1] ? parts[1].split('&') : [];
    try {
      var f = document.createElement('form');
      f.method = 'GET'; f.action = base; f.target = '_top'; f.style.display = 'none';
      params.forEach(function (p) {
        var kv = p.split('=');
        var inp = document.createElement('input');
        inp.type = 'hidden';
        inp.name = decodeURIComponent(kv[0]);
        inp.value = decodeURIComponent(kv[1] || '');
        f.appendChild(inp);
      });
      document.body.appendChild(f);
      f.submit();
      return;
    } catch (e) { }
    try { var a = document.createElement('a'); a.href = url; a.target = '_top'; a.style.display = 'none'; document.body.appendChild(a); a.click(); return; } catch (e) { }
    try { window.open(url, '_top'); return; } catch (e) { }
    try { window.top.location.href = url; } catch (e) { document.location.href = url; }
  }

  function _bacaToken() {
    var t = '';
    try { t = sessionStorage.getItem('_st') || ''; } catch (e) { }
    if (!t) { try { t = localStorage.getItem('_st') || ''; } catch (e) { } }
    if (!t) {
      var m = document.cookie.match(/(?:^|;)\s*_st=([^;]*)/);
      if (m) t = decodeURIComponent(m[1]);
    }
    return t;
  }

  function _hapusToken() {
    try { sessionStorage.removeItem('_st'); } catch (e) { }
    try { localStorage.removeItem('_st'); } catch (e) { }
    document.cookie = '_st=; max-age=0; path=/';
  }

  (function () {
    var overlay = document.createElement('div');
    overlay.id = '_sesOverlay';
    overlay.style.cssText = [
      'position:fixed', 'top:0', 'left:0', 'width:100%', 'height:100%',
      'background:#fff', 'z-index:99999', 'display:flex',
      'align-items:center', 'justify-content:center', 'flex-direction:column',
      'gap:14px', 'font-family:Plus Jakarta Sans,sans-serif', 'color:#64748b'
    ].join(';');
    overlay.innerHTML =
      '<div style="width:40px;height:40px;border:4px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:_spin .8s linear infinite;"></div>'
      + '<div style="font-size:.9rem;font-weight:600;">Memeriksa sesi...</div>'
      + '<style>@keyframes _spin{to{transform:rotate(360deg);}}</style>';
    document.body.appendChild(overlay);

    var token = _bacaToken();

    google.script.run
      .withSuccessHandler(function (res) {
        if (res && res.valid) {
          var el = document.getElementById('_sesOverlay');
          if (el) el.remove();
          if (typeof _onSesiValid === 'function') _onSesiValid();
        } else {
          _hapusToken();
          _redirect(BASE + '?page=login');
        }
      })
      .withFailureHandler(function () {
        _hapusToken();
        _redirect(BASE + '?page=login');
      })
      .cekSesi(token);
  })();

  function navTo(page) {
    _redirect(BASE + '?page=' + page);
  }

  function konfirmasiLogout() {
    Swal.fire({
      icon: 'question', title: 'Logout?',
      text: 'Anda akan keluar dari sesi ini.',
      showCancelButton: true,
      confirmButtonText: 'Ya, Logout',
      cancelButtonText: 'Batal',
      confirmButtonColor: '#ef4444'
    }).then(function (res) {
      if (!res.isConfirmed) return;
      google.script.run
        .withSuccessHandler(function () { _hapusToken(); _redirect(BASE + '?page=login'); })
        .withFailureHandler(function () { _hapusToken(); _redirect(BASE + '?page=login'); })
        .logout();
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    var aktif = document.body.dataset.active;
    document.querySelectorAll('.nav-btn').forEach(function (btn) {
      if (btn.dataset.page === aktif) btn.classList.add('active');
    });
  });
</script>
