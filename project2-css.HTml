<style>
    :root {
      --navy:    #0f2544;
      --blue:    #1a56db;
      --sky:     #3b82f6;
      --accent:  #f59e0b;
      --danger:  #ef4444;
      --success: #10b981;
      --gray-50: #f8fafc;
      --gray-100:#f1f5f9;
      --gray-200:#e2e8f0;
      --gray-400:#94a3b8;
      --gray-600:#475569;
      --gray-800:#1e293b;
      --white:   #ffffff;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,.10);
      --shadow-lg: 0 10px 40px rgba(0,0,0,.14);
      --radius: 12px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ── NAVBAR ─────────────────────────────────────────── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy);
      display: flex;
      align-items: center;
      padding: 0 24px;
      height: 58px;
      gap: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: -.2px;
      margin-right: auto;
      text-decoration: none;
    }
    .navbar-brand {
      /*width: 32px; height: 32px;
      background: var(--blue);*/
      background: linear-gradient(to right, #FFF9C4, #FFEB3B, #FBC02D);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      border-radius: 8px;
      align-items: center; justify-content: center;
      font-size: 30px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all .18s;
      white-space: nowrap;
    }

    /* menu aktif */
    .nav-btn.active {
      background: rgba(255, 255, 255, 0.25);
      color: #E8E9EB;
      
    }

    .nav-btn-ghost {
      color: rgba(255,255,255,.85);
    }
    .nav-btn-ghost:hover {
      background: rgba(255,255,255,.16);
      color: white;
    }

    .nav-btn-accent {
      color: rgba(255,255,255,.85);
    }
    .nav-btn-accent:hover {
       background: rgba(255,255,255,.16); 
       color: white;
    }
    
    .nav-btn-danger {
      color: rgba(255,255,255,.85);
    }
    .nav-btn-danger:hover{
      background: rgba(255,255,255,.16);
      color: white;
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    .container { max-width: 1440px; margin: 0 auto; padding: 24px 20px; }

    /* ── CARD ────────────────────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1.5px solid var(--gray-100);
    }
    .card-header-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--blue), var(--sky));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--navy);
    }
    .card-subtitle {
      font-size: 0.76rem;
      color: var(--gray-400);
      margin-top: 1px;
    }

    /* Edit mode badge */
    .edit-badge {
      display: none;
      margin-left: auto;
      background: var(--accent);
      color: var(--navy);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: .3px;
    }
    body.edit-mode .edit-badge { display: inline-flex; align-items: center; gap: 4px; }
    body.edit-mode .card:first-of-type {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245,158,11,.15);
    }

    /* ── FORM GRID ───────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px 18px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.span2 { grid-column: span 2; }
    .form-group.full  { grid-column: 1 / -1; }

    label {
      font-size: 0.74rem;
      font-weight: 700;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    input[type="text"],
    input[type="date"],
    select,
    textarea {
      padding: 9px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.88rem;
      color: var(--gray-800);
      background: var(--gray-50);
      transition: border-color .18s, box-shadow .18s, background .18s;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--blue);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(26,86,219,.12);
    }
    textarea { resize: vertical; min-height: 70px; }

    #kodeKlasList div:hover { background: #f0f7ff; color: var(--blue); }

    /* ── TOMBOL ──────────────────────────────────────────── */
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary   { background: var(--blue);    color: white; }
    .btn-primary:hover   { background: #1648c0; }
    .btn-warning   { background: var(--accent);  color: var(--navy); }
    .btn-warning:hover   { background: #fbbf24; }
    .btn-secondary { background: var(--gray-100); color: var(--gray-600); border: 1px solid var(--gray-200); }
    .btn-secondary:hover { background: var(--gray-200); }
    .btn-danger    { background: var(--danger);  color: white; }
    .btn-danger:hover    { background: #dc2626; }
    .btn-success   { background: var(--success); color: white; }
    .btn-success:hover   { background: #059669; }

    /* ── SEARCH AREA ─────────────────────────────────────── */
    .search-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 14px;
    }
    .search-field {
      flex: 1;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .search-field label { font-size: 0.72rem; }
    .search-input-wrap { position: relative; }
    .search-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
      pointer-events: none;
    }
    .search-input-wrap input {
      padding-left: 30px;
    }

  /* ── QR AREA ─────────────────────────────────────────── */
  .qr-wrap {
    border: 1.5px dashed #93c5fd;
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;

    display: flex;
    flex-direction: column;      /* elemen tersusun ke bawah */
    align-items: center;         /* menengahkan horizontal */
    gap: 12px;
    }

/* tombol scan */
.btnscan{
  padding: 8px 16px;
  font-size: 0.82rem;

  background: #dbeafe;         /* menyesuaikan warna card */
  color: #1e3a8a;

  border: none;                /* hilangkan border */
  border-radius: 8px;

  cursor: pointer;
  font-weight: 600;

  transition: all 0.2s ease;
}

/* efek hover agar lebih interaktif */
.btnscan:hover{
  background: #bfdbfe;
}

#qrStatus{
  font-size: 0.8rem;
  color: #1e40af;
  text-align: center;
}
    /* ── TABEL ───────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; border-radius: 5px; ; }

    table { width: 100%; border-collapse: collapse; min-width: 960px; font-size: 0.82rem; }

    thead tr {
      background: #283289;
      color: white;
    }
    thead th {
      padding: 11px 14px;
      text-align: left;
      font-weight: 700;
      font-size: 0.73rem;
      letter-spacing: .4px;
      white-space: nowrap;
      border-bottom: 1px solid var(--gray-200);
    }
    tbody tr {
      border-bottom: 1px solid var(--gray-100);
      transition: background.12s;
    }
    tbody tr:hover { background: #f0f7ff; }
    tbody tr:nth-child(even) { background: var(--gray-50); }
    tbody tr:nth-child(even):hover { background: #f0f7ff; }

    td {
      border-bottom: 1px solid var(--gray-100);
      padding: 9px 14px;
      color: var(--gray-600);
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }
    td.td-no { color: var(--gray-400); font-size: 0.75rem; text-align: center; width: 42px; }
    td.td-aksi { white-space: nowrap; }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .badge-aktif   { color: #065f46; }
    .badge-inaktif { color: #475569; }
    .badge-musnah  { color: #991b1b; }

    .btn-tbl {
      padding: 4px 10px;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-tbl-view { margin-right:5px; background: #fffE99; color: #ffD800; }
    .btn-tbl-view:hover { background: #FFE302; color: white; }
    .btn-tbl-edit  { background: #dbeafe; color: #1e40af; margin-right: 4px; }
    .btn-tbl-edit:hover  { background: var(--blue); color: white; }
    .btn-tbl-hapus { background: #fee2e2; color: #991b1b; }
    .btn-tbl-hapus:hover { background: var(--danger); color: white; }

    .state-row td {
      text-align: center;
      padding: 40px;
      color: var(--gray-400);
      font-size: 0.88rem;
    }

    /* ── INFO ROW ─────────────────────────────────────────── */
    .table-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      font-size: 0.78rem;
      color: var(--gray-400);
    }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 640px) {
      .navbar { padding: 0 14px; gap: 4px; }
      .nav-btn span { display: none; }
      .container { padding: 14px 12px; }
      .card { padding: 16px; }
      .form-grid { grid-template-columns: 1fr; }
    }

    /* ── MODAL VIEW DETAIL ───────────────────────────────── */
#modalView {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(15,37,68,.55);
  backdrop-filter: blur(2px);
  overflow-y: auto;
  padding: 24px 16px;
}
#modalView.aktif { display: block; }

.modal-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  max-width: 860px;
  margin: 0 auto;
  overflow: hidden;
}

.modal-header {
  background: linear-gradient(135deg, #283289, #1a56db);
  color: white;
  padding: 20px 28px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.modal-header-icon {
  width: 44px; height: 44px;
  background: rgba(255,255,255,.18);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.modal-header-title { font-size: 1rem; font-weight: 800; }
.modal-header-sub   { font-size: 0.75rem; opacity: .75; margin-top: 2px; }
.modal-close {
  margin-left: auto;
  background: rgba(255,255,255,.18);
  border: none; color: white;
  width: 36px; height: 36px;
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
  flex-shrink: 0;
}
.modal-close:hover { background: rgba(255,255,255,.32); }

.modal-body { padding: 28px; }

.detail-section {
  margin-bottom: 24px;
}
.detail-section-title {
  border-bottom: 1.5px solid var(--gray-100);
  margin-bottom: 20px;
  margin-top:5px;
}
.detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px 20px;
}

.detail-label {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--gray-400);
  margin-bottom: 3px;
}
.detail-value {
  font-size: 0.9rem;
  color: var(--gray-800);
  font-weight: 500;
  word-break: break-word;
}
.detail-value.empty { color: var(--gray-400); font-weight: 400; font-style: italic; }
.detail-value.full  { grid-column: 1 / -1; }

.detail-judul {
  background-color:  rgba(128, 128, 128, 0.1);
  margin-top: 10px;
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 0.95rem;
  color: var(--gray-800);
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 20px;
}

.modal-footer {
  padding: 16px 28px;
  border-top: 1.5px solid var(--gray-100);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  flex-wrap: wrap;
}
  </style>
