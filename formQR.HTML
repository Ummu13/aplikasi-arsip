    <script>
        /* ══════════════════════════════════════════════════════════════════
           Dipanggil oleh session-helper setelah sesi terkonfirmasi
        ══════════════════════════════════════════════════════════════════ */
        function _onSesiValid() {
            updateLabel();
        }

        /* ══════════════════════════════════════════════════════════════════
           UPDATE LABEL DARI INPUT FORM
        ══════════════════════════════════════════════════════════════════ */
        function updateLabel() {
            var aktif = document.getElementById('inpAktif').value || ' ';
            var inaktif = document.getElementById('inpInaktif').value || ' ';
            var ket = document.getElementById('inpKet').value || ' ';
            var lokasi = document.getElementById('inpLokasi').value || ' ';
            var klasifikasi = document.getElementById('inpKlasifikasi').value || ' ';
            var instansi = document.getElementById('inpInstansi').value || ' ';
            var unitKerja = document.getElementById('inpUnitKerja').value || ' ';
            var tahun = document.getElementById('inpTahun').value || ' ';
            var noBok = document.getElementById('inpNoBok').value || ' ';
            var noBerkas = document.getElementById('inpNoBerkas').value || ' ';

            var container = document.getElementById('labelSheet');

            var tahunStr = tahun;
            if (tahun.trim() !== '' && !tahun.toUpperCase().includes('TAHUN')) {
                tahunStr = 'TAHUN ' + tahun;
            }

            container.innerHTML = buildLabelHTML(noBok, noBerkas, klasifikasi, lokasi, tahunStr, aktif, inaktif, ket, instansi, unitKerja);

            // Generate QR otomatis berdasarkan No BOK
            var qrDiv = container.querySelector('.qr-box-inner');
            if (qrDiv && noBok.trim() !== '') {
                qrDiv.innerHTML = '';
                new QRCode(qrDiv, {
                    text: noBok.trim(),
                    width: 100,
                    height: 95,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
            } else if (qrDiv) {
                qrDiv.innerHTML = '<div style="width:90px; height:90px; display:flex; align-items:center; justify-content:center; color:#ccc; font-size:10px; border:1px dashed #ccc;">Isi No BOK</div>';
            }
        }

        function buildLabelHTML(noBok, noBerkas, klas, lokasi, tahun,
            retAktif, retInaktif, retKet, instansi, unitKerja) {
            return '\
<table class="lbl-table">\
  <tbody>\
    <!-- Baris 1: label header -->\
    <tr class="row-header-label">\
      <td class="lbl-cell lbl-retensi-header" colspan="3">RETENSI</td>\
      <td class="lbl-cell lbl-lokasi-header">LOKASI</td>\
      <td class="lbl-cell lbl-kodeheader">KODE KLASIFIKASI</td>\
    </tr>\
    <!-- Baris 2: sub-header + nilai lokasi (rowspan=2) + nilai kode (rowspan=2) -->\
    <tr class="row-sub-label">\
      <td class="lbl-cell lbl-sub">AKTIF</td>\
      <td class="lbl-cell lbl-sub">INAKTIF</td>\
      <td class="lbl-cell lbl-sub">KET</td>\
      <td class="lbl-cell lbl-lokasi-val" rowspan="2">' + escHtml(lokasi) + '</td>\
      <td class="lbl-cell lbl-kodeheader" rowspan="2" \
          style="font-size:1.1rem;font-weight:800;vertical-align:middle;">\
        ' + escHtml(klas) + '\
      </td>\
    </tr>\
    <!-- Baris 3: nilai retensi -->\
    <tr class="row-val-big">\
      <td class="lbl-cell lbl-val-big">' + escHtml(retAktif) + '</td>\
      <td class="lbl-cell lbl-val-big">' + escHtml(retInaktif) + '</td>\
      <td class="lbl-cell lbl-val-big">' + escHtml(retKet) + '</td>\
    </tr>\
    <tr class="row-instansi">\
      <td class="lbl-cell lbl-instansi" colspan="5">' + escHtml(instansi) + '</td>\
    </tr>\
    <tr class="row-unitkerja">\
      <td class="lbl-cell lbl-unitkerja" colspan="5">' + escHtml(unitKerja) + '</td>\
    </tr>\
    <tr class="row-tahun">\
      <td class="lbl-cell lbl-tahun" colspan="5">' + escHtml(tahun) + '</td>\
    </tr>\
    <tr class="row-bok-header">\
      <td class="lbl-cell lbl-bokheader" colspan="2">NO</td>\
      <td class="lbl-cell lbl-berkasheader">NO</td>\
      <td class="lbl-cell lbl-bcheader" colspan="2" rowspan="2"\
          style="vertical-align:middle;">QR&nbsp;CODE</td>\
    </tr>\
      <tr class="row-bok-header">\
      <td class="lbl-cell lbl-bokheader" colspan="2">BOK</td>\
      <td class="lbl-cell lbl-berkasheader">BERKAS</td>\
    </tr>\
    <tr class="row-bok-val">\
      <td class="lbl-cell lbl-bokval" colspan="2">' + escHtml(noBok) + '</td>\
      <td class="lbl-cell lbl-berkasval">' + escHtml(noBerkas) + '</td>\
      <td class="lbl-cell lbl-qrbox" colspan="2" style="vertical-align:middle;">\
        <div class="qr-box-inner"></div>\
      </td>\
    </tr>\
  </tbody>\
</table>';
        }

        function resetForm() {
            document.getElementById('inpAktif').value = '';
            document.getElementById('inpInaktif').value = '';
            document.getElementById('inpKet').value = '';
            document.getElementById('inpLokasi').value = '';
            document.getElementById('inpKlasifikasi').value = '';
            document.getElementById('inpInstansi').value = '';
            document.getElementById('inpUnitKerja').value = '';
            document.getElementById('inpTahun').value = '';
            document.getElementById('inpNoBok').value = '';
            document.getElementById('inpNoBerkas').value = '';
            updateLabel();
        }

        /* ══════════════════════════════════════════════════════════════════
           UNDUH & PRINT LABEL
        ══════════════════════════════════════════════════════════════════ */
        function showModal(action) {
            var isUnduh = action === 'unduh';

            if (action === 'print') {
                var noBokText = document.getElementById('inpNoBok').value || 'qr';
                var noBok = noBokText.trim().replace(/[\/\\:*?"<>|]/g, '-');
                printPDF(noBok);
                return;
            }

            var modalTitle = 'Unduh Label QR';
            var btnText = 'Unduh';

            Swal.fire({
                title: '<div class="card-headerh2">' + modalTitle + '</div>',
                html: '\
                <div class="form-grid2">\
                  <div class="form-group full">\
                    <label>Pilih Format:</label>\
                    <select id="swal-format">\
                      <option value="">--Pilih--</option>\
                      <option value="jpeg">JPEG (.jpg)</option>\
                      <option value="pdf">PDF (.pdf)</option>\
                    </select>\
                  </div>\
                </div>',
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: btnText,
                cancelButtonText: 'Batal',
                preConfirm: function () {
                    var fmt = document.getElementById('swal-format').value;
                    if (!fmt) {
                        Swal.showValidationMessage('Silakan pilih format terlebih dahulu');
                    }
                    return fmt;
                }
            }).then(function (res) {
                if (!res.isConfirmed) return;
                prosesLabel(action, res.value);
            });
        }

        function prosesLabel(action, format) {
            var noBokText = document.getElementById('inpNoBok').value || 'qr';
            var noBok = noBokText.trim().replace(/[\/\\:*?"<>|]/g, '-');

            if (action === 'unduh') {
                if (format === 'jpeg') {
                    unduhImage(noBok);
                } else {
                    unduhPDF(noBok);
                }
            } else {
                // print
                if (format === 'jpeg') {
                    printImage(noBok);
                } else {
                    printPDF(noBok);
                }
            }
        }

        /**
         * Helper: render label ke canvas (off-screen) lalu panggil callback(canvas)
         */
        function _renderLabelCanvas(callback) {
            var hidden = document.getElementById('qrHidden');
            hidden.innerHTML = '';

            var wrap = document.createElement('div');
            wrap.style.cssText = 'background:#fff;padding:0;display:inline-block;';
            wrap.innerHTML = document.getElementById('labelSheet').innerHTML;
            hidden.appendChild(wrap);

            setTimeout(function () {
                var qrDiv = wrap.querySelector('.qr-box-inner');
                var noBokText = document.getElementById('inpNoBok').value.trim();
                if (qrDiv && noBokText) {
                    qrDiv.innerHTML = '';
                    new QRCode(qrDiv, {
                        text: noBokText,
                        width: 90, height: 90,
                        colorDark: '#000000', colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }
                setTimeout(function () {
                    if (typeof html2canvas !== 'undefined') {
                        html2canvas(wrap, { scale: 2, backgroundColor: '#fff' }).then(function (canvas) {
                            hidden.innerHTML = '';
                            callback(canvas);
                        });
                    } else {
                        Swal.fire({ icon: 'info', title: 'Info', text: 'Library html2canvas tidak tersedia.' });
                    }
                }, 600);
            }, 300);
        }

        /* ── Unduh sebagai JPEG (15 × 10 cm) ── */
        function unduhImage(nama) {
            _renderLabelCanvas(function (srcCanvas) {
                /* 13 × 9 cm pada 150 DPI (portrait) */
                var dpi = 150;
                var wPx = Math.round(13 / 2.54 * dpi);  /* ~768 px */
                var hPx = Math.round(9 / 2.54 * dpi);  /* ~531 px */

                var c = document.createElement('canvas');
                c.width = wPx;
                c.height = hPx;
                var ctx = c.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, wPx, hPx);

                var pad = 20;
                var scaleX = (wPx - pad * 2) / srcCanvas.width;
                var scaleY = (hPx - pad * 2) / srcCanvas.height;
                var scale = Math.min(scaleX, scaleY);
                var dw = srcCanvas.width * scale;
                var dh = srcCanvas.height * scale;
                var dx = (wPx - dw) / 2;
                var dy = (hPx - dh) / 2;
                ctx.drawImage(srcCanvas, dx, dy, dw, dh);

                var a = document.createElement('a');
                a.download = 'QR_' + nama + '.jpg';
                a.href = c.toDataURL('image/jpeg', 0.95);
                a.click();
            });
        }

        /* ── Print sebagai JPEG (15 × 10 cm) ── */
        function printImage(nama) {
            _renderLabelCanvas(function (canvas) {
                var dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                var win = window.open('', '_blank');
                win.document.write('<!DOCTYPE html><html><head>'
                    + '<title>Print Label QR</title>'
                    + '<style>'
                    + 'body{margin:0;display:flex;justify-content:center;'
                    + 'align-items:center;min-height:100vh;background:#fff;}'
                    + 'img{width:9cm;height:13cm;object-fit:contain;}'
                    + '@media print{'
                    + '@page{size:9cm 13cm portrait;margin:0;}'
                    + 'body{min-height:auto;}'
                    + '}'
                    + '</style></head>'
                    + '<body><img src="' + dataUrl + '" '
                    + 'onload="setTimeout(function(){window.print();},400);"/>'
                    + '</body></html>');
                win.document.close();
            });
        }

        /* ── Unduh sebagai PDF (15 × 10 cm, auto-download) ── */
        function unduhPDF(nama) {
            _renderLabelCanvas(function (canvas) {
                var imgData = canvas.toDataURL('image/jpeg', 0.95);
                /* Portrait 13 × 9 cm */
                var doc = new jspdf.jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: [90, 130]   /* lebar=90mm(9cm), tinggi=130mm(13cm) */
                });

                var margin = 4;
                var pageW = 90 - margin * 2;
                var pageH = 130 - margin * 2;
                var imgRatio = canvas.width / canvas.height;
                var fitW = pageW;
                var fitH = fitW / imgRatio;
                if (fitH > pageH) {
                    fitH = pageH;
                    fitW = fitH * imgRatio;
                }
                var x = (90 - fitW) / 2;
                var y = (130 - fitH) / 2;

                doc.addImage(imgData, 'JPEG', x, y, fitW, fitH);
                doc.save('QR_' + nama + '.pdf');
            });
        }
        /* ── Print sebagai PDF (15 × 10 cm) ── */
        function printPDF(nama) {
            _renderLabelCanvas(function (canvas) {
                var imgData = canvas.toDataURL('image/jpeg', 0.95);
                /* Portrait 13 × 9 cm */
                var doc = new jspdf.jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: [90, 130]   /* lebar=90mm(9cm), tinggi=130mm(13cm) */
                });

                var margin = 4;
                var pageW = 90 - margin * 2;
                var pageH = 130 - margin * 2;
                var imgRatio = canvas.width / canvas.height;
                var fitW = pageW;
                var fitH = fitW / imgRatio;
                if (fitH > pageH) {
                    fitH = pageH;
                    fitW = fitH * imgRatio;
                }
                var x = (90 - fitW) / 2;
                var y = (130 - fitH) / 2;

                doc.addImage(imgData, 'JPEG', x, y, fitW, fitH);

                var pdfBlob = doc.output('blob');
                var blobUrl = URL.createObjectURL(pdfBlob);
                var win = window.open(blobUrl, '_blank');
                if (win) {
                    win.addEventListener('load', function () {
                        setTimeout(function () { win.print(); }, 500);
                    });
                }
            });
        }

        /* ══════════════════════════════════════════════════════════════════
           HELPERS
        ══════════════════════════════════════════════════════════════════ */
        function escHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>

    <!-- html2canvas untuk image export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- jsPDF untuk PDF export -->

</body>
