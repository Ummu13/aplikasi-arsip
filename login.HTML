<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <?!= include('project1-css'); ?>
</head>
<body>

<div class="loginForm">
  <img src="https://drive.google.com/thumbnail?id=1KlmiVn5j-Ll62gfCWv7Afc2rVFmtPN0z" class="logo">
  <h1>WELCOME</h1>
  <p>Please login using your registered email.</p>
  <form id="loginForm">
    <label>Email</label><br>
    <input type="email" id="username" class="form" required><br>
    <div class="password-wrap">
      <label>Password</label><br>
      <input type="password" id="password" class="form" required><br>
      <i class="fa-solid fa-eye" id="togglePassword"></i>
    </div>
    <input type="submit" value="Login" id="buttonLogin">
  </form>
  <span id="loginMsg" style="display:block;margin-top:10px;font-size:12px;min-height:18px;"></span>
</div>

<script>
  var BASE = 'https://script.google.com/macros/s/AKfycby-HCCJCr8TUeN08F7Ks8I9pmlVjPFBe4joT4-JhTeb/dev';

  /* ── Simpan token ke semua storage ── */
  function _simpanToken(token) {
    try { sessionStorage.setItem('_st', token); } catch(e) {}
    try { localStorage.setItem('_st', token); }   catch(e) {}
    // Cookie session (hilang saat browser tutup)
    document.cookie = '_st=' + encodeURIComponent(token)
      + '; path=/; SameSite=Lax';
  }

  /* ── Hapus token dari semua storage ── */
  function _hapusToken() {
    try { sessionStorage.removeItem('_st'); } catch(e) {}
    try { localStorage.removeItem('_st'); }   catch(e) {}
    document.cookie = '_st=; max-age=0; path=/';
  }

  /* ── Baca token (coba semua storage) ── */
  function _bacaToken() {
    var t = '';
    try { t = sessionStorage.getItem('_st') || ''; } catch(e) {}
    if (!t) { try { t = localStorage.getItem('_st') || ''; } catch(e) {} }
    if (!t) {
      var m = document.cookie.match(/(?:^|;)\s*_st=([^;]*)/);
      if (m) t = decodeURIComponent(m[1]);
    }
    return t;
  }

  /* ── Redirect: LANGSUNG, tanpa async/then ── */
  /* Safari hanya mengizinkan navigasi yang dipicu LANGSUNG dari event user  */
  /* atau dari kode synchronous yang berjalan tanpa jeda async               */
  function _redirect(url) {
  // Pisahkan base URL dan query string
  var parts   = url.split('?');
  var base    = parts[0];
  var params  = parts[1] ? parts[1].split('&') : [];

  // Buat form GET — parameter harus jadi hidden input, BUKAN di action URL
  try {
    var f = document.createElement('form');
    f.method = 'GET';
    f.action = base;        // action TANPA query string
    f.target = '_top';
    f.style.display = 'none';

    // Setiap ?key=value dijadikan hidden input
    params.forEach(function(p) {
      var kv = p.split('=');
      var inp = document.createElement('input');
      inp.type  = 'hidden';
      inp.name  = decodeURIComponent(kv[0]);
      inp.value = decodeURIComponent(kv[1] || '');
      f.appendChild(inp);
    });

    document.body.appendChild(f);
    f.submit();
    return;
  } catch(e) {}

  // Fallback: anchor click
  try {
    var a = document.createElement('a');
    a.href = url; a.target = '_top';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    return;
  } catch(e) {}

  // Fallback: window.open
  try { window.open(url, '_top'); return; } catch(e) {}

  // Last resort
  try { window.top.location.href = url; } catch(e) {
    document.location.href = url;
  }
}

  /* ── Cek token yang sudah ada saat halaman dibuka ── */
  (function(){
    var t = _bacaToken();
    if (!t) return;

    // Ada token → cek ke server
    document.getElementById('loginMsg').textContent = '';
    google.script.run
      .withSuccessHandler(function(res){
        if (res && res.valid) {
          document.getElementById('loginMsg').textContent = '';
          _redirect(BASE + '?page=Dashboard');
        } else {
          _hapusToken();
          document.getElementById('loginMsg').textContent = '';
        }
      })
      .withFailureHandler(function(){
        _hapusToken();
        document.getElementById('loginMsg').textContent = '';
      })
      .cekSesi(t);
  })();

  /* ── Submit form login ── */
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    var btn  = document.getElementById('buttonLogin');
    var msg  = document.getElementById('loginMsg');
    var user = document.getElementById('username').value.trim();
    var pass = document.getElementById('password').value.trim();

    if (!user || !pass) {
      msg.style.color = '#ef4444';
      msg.textContent = '⚠ Username dan password wajib diisi.';
      return;
    }

    btn.disabled = true;
    btn.value    = 'Memproses...';
    msg.style.color = '#64748b';

    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.ok && res.token) {
          // ✅ Simpan token 
          _simpanToken(res.token);

          msg.style.color = '#ffffff';
          btn.value = ' Berhasil...';

          _redirect(BASE + '?page=Dashboard');

        } else {
          btn.disabled = false;
          btn.value    = 'Login';

          // Swal hanya untuk pesan GAGAL — tidak ada redirect setelahnya
          Swal.fire({
            icon: 'error',
            title: 'Login Gagal',
            text: 'Username atau password salah.',
            confirmButtonColor: '#ef4444'
          });
        }
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.value    = 'Login';
        msg.style.color = '#ef4444';
        msg.textContent = '❌ ' + (err.message || 'Terjadi kesalahan.');
        Swal.fire({
          icon: 'error',
          title: 'Error',
          text: err.message || 'Terjadi kesalahan server.'
        });
      })
      .checklogin(user, pass);
  });

  /* ── Toggle show/hide password ── */
  document.getElementById('togglePassword').addEventListener('click', function(){
    var pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    this.classList.toggle('fa-eye');
    this.classList.toggle('fa-eye-slash');
  });
</script>
</body>
</html>
