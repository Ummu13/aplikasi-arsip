name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main # Jalankan saat ada push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Clasp
        run: npm install -g @google/clasp

      - name: Setup Clasp Credentials
        run: |
          echo "$CLASP_CREDENTIALS" > ~/.clasprc.json
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}

      - name: Setup Clasp Project Settings
        run: |
          echo "{\"scriptId\":\"$SCRIPT_ID\",\"rootDir\":\"$GITHUB_WORKSPACE\"}" > .clasp.json
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}

      - name: Push Code to Apps Script
        run: clasp push -f

      - name: Deploy Apps Script (Update Existing URL)
        run: |
          clasp deploy -i "$DEPLOYMENT_ID" -d "Auto-deploy via GitHub Actions: ${{ github.sha }}"
        env:
          DEPLOYMENT_ID: ${{ secrets.DEPLOYMENT_ID }}
