name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Static Analysis & Validation
        run: npm run validate

      - name: Install Google Clasp
        run: npm install -g @google/clasp

      - name: Setup Clasp Credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          # Write the secret using environment variable to avoid quote parsing issues
          echo "$CLASPRC_JSON" > ~/.clasprc.json
          chmod 600 ~/.clasprc.json
          
          # Debugging: Check if file is empty
          FILE_SIZE=$(stat -c%s ~/.clasprc.json)
          if [ "$FILE_SIZE" -lt 10 ]; then
            echo "ERROR: ~/.clasprc.json is empty or too small ($FILE_SIZE bytes)!"
            echo "Please check your CLASPRC_JSON secret in GitHub."
            exit 1
          fi

      - name: Push to Google Apps Script
        run: clasp push -f

      - name: Deploy new version
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: clasp deploy -i ${{ secrets.DEPLOYMENT_ID }} -d "$COMMIT_MSG"
