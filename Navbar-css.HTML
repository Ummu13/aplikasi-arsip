<style>
    /* ── NAVBAR ─────────────────────────────────────────── */
    :root {
        --navy: #0f2544;
        --blue: #1a56db;
        --sky: #3b82f6;
        --accent: #f59e0b;
        --danger: #ef4444;
        --success: #10b981;
        --gray-50: #f8fafc;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --gray-400: #94a3b8;
        --gray-600: #475569;
        --gray-800: #1e293b;
        --white: #ffffff;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, .08), 0 1px 2px rgba(0, 0, 0, .06);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, .10);
        --shadow-lg: 0 10px 40px rgba(0, 0, 0, .14);
        --radius: 12px;
        --radius-sm: 8px;
    }

    *,
    *::before,
    *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    .navbar {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: var(--navy);
        display: flex;
        align-items: center;
        padding: 0 24px;
        height: 64px;
        gap: 8px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, .25);
    }

    .navbar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        color: white;
        font-weight: 800;
        letter-spacing: -.2px;
        margin-right: auto;
        text-decoration: none;
        background: linear-gradient(to right, #FFF9C4, #FFEB3B, #FBC02D);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 24px;
    }

    .nav-links {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .nav-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        border-radius: var(--radius-sm);
        border: none;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: all .18s;
        white-space: nowrap;
        color: rgba(255, 255, 255, .85);
    }

    .nav-btn i {
        font-size: 1.1rem;
    }

    .nav-btn:hover {
        background: rgba(255, 255, 255, .1);
        color: white;
    }

    .nav-btn.active {
        background: rgba(255, 255, 255, 0.2);
        color: white;
    }

    .nav-btn-danger:hover {
        background: var(--danger);
    }

    /* Hamburger Menu */
    .hamburger-menu {
        display: none;
        background: transparent;
        border: none;
        color: white;
        font-size: 1.5rem;
        cursor: pointer;
        padding: 8px;
    }

    .dropdown {
        position: relative;
    }

    .dropdown-content {
        display: none;
        position: absolute;
        top: 100%;
        right: 0;
        background-color: var(--white);
        min-width: 220px;
        box-shadow: var(--shadow-lg);
        border-radius: var(--radius-sm);
        padding: 8px 0;
        overflow: hidden;
    }

    .dropdown-content a {
        color: var(--gray-800);
        padding: 10px 16px;
        text-decoration: none;
        display: flex;
        align-items: center;
        font-size: 0.85rem;
        font-weight: 500;
        transition: background 0.2s;
    }

    .dropdown-content a:hover {
        background-color: var(--gray-100);
        color: var(--blue);
    }

    .dropdown:hover .dropdown-content {
        display: block;
    }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 992px) {
        .navbar {
            padding: 0 16px;
            height: 60px;
        }

        .hamburger-menu {
            display: block;
        }

        .nav-links {
            position: fixed;
            top: 60px;
            right: -100%;
            width: 280px;
            height: calc(100vh - 60px);
            background: var(--navy);
            flex-direction: column;
            align-items: stretch;
            padding: 24px 16px;
            transition: right 0.3s ease;
            box-shadow: -4px 0 12px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .nav-links.active {
            right: 0;
        }

        .nav-btn {
            padding: 12px 16px;
            font-size: 0.95rem;
        }

        .dropdown-content {
            position: static;
            display: block;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: none;
            margin-top: 8px;
            border-radius: 0;
        }

        .dropdown-content a {
            color: rgba(255, 255, 255, 0.7);
            padding-left: 44px;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }
    }

    @media (max-width: 480px) {
        .navbar-brand {
            font-size: 20px;
        }
        
        .nav-links {
            width: 100%;
        }
    }
</style>
