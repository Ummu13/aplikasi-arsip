<style>
    :root {
        --bg-color: #f8fafc;
        --navy-dark: #090d1a;
        --navy-medium: #0f172a;
        --navy-light: #1e293b;
        --gold: #facc15;
        --gold-hover: #eab308;
        --white: #ffffff;
        --text-dark: #1e293b;
        --text-muted: #64748b;
        --text-light: #94a3b8;
        --border-color: #e2e8f0;
        --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.02);
        --hover-shadow: 0 10px 20px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-dark);
    }

    .container {
        max-width: 1440px;
        margin: 0 auto;
        padding: 0;
    }

    /* ── TOP BAR ── */
    .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 16px;
    }

    .top-bar-left {
        display: flex;
        flex-direction: column;
    }

    .page-title {
        font-size: 1.6rem;
        font-weight: 800;
        color: var(--navy-medium);
        line-height: 1.2;
    }

    .page-subtitle {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 2px;
    }

    .top-bar-center {
        flex: 1;
        max-width: 420px;
    }

    .search-box {
        position: relative;
        width: 100%;
    }

    .search-box i {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-light);
        font-size: 0.95rem;
    }

    .search-box input {
        width: 100%;
        padding: 11px 16px 11px 40px;
        font-size: 0.88rem;
        font-family: inherit;
        border: 1px solid var(--border-color);
        border-radius: 10px;
        background: var(--white);
        outline: none;
        transition: all 0.2s;
        color: var(--text-dark);
        box-shadow: var(--card-shadow);
    }

    .search-box input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
