  <style>
    /* ── STAT CARDS ── */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:24px;}
    .stat-card{border-radius:14px ;padding:20px 22px;box-shadow:0 2px 12px rgba(0,0,0,.07);display:flex;flex-direction:column;gap:6px;border-left:5px solid transparent;transition:transform .18s,box-shadow .18s;cursor:default;}
    .stat-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.12);}
    .stat-card.total{background: linear-gradient(135deg,rgba(79, 172, 254, 0.4),rgba(0, 51, 102, 0.3));
                     backdrop-filter: blur(12px);
                     -webkit-backdrop-filter: blur(12px);
                     border-radius: 15px;
                     border: 1px solid rgba(255,255,255,0.2);
                     color: white;}
    .stat-card.aktif{background: linear-gradient(135deg,rgba(46, 204, 113, 0.4),rgba(39, 174, 96, 0.3));
                     backdrop-filter: blur(12px);
                     -webkit-backdrop-filter: blur(12px);
                     border-radius: 15px;
                     border: 1px solid rgba(255,255,255,0.2);
                     color: white;}
    .stat-card.inaktif{background: linear-gradient(135deg,rgba(255, 215, 0, 0.4),rgba(255, 165, 0, 0.3));
                       backdrop-filter: blur(12px);
                       -webkit-backdrop-filter: blur(12px);
                       border-radius: 15px;
                       border: 1px solid rgba(255,255,255,0.2);
                       color: #333;}
    .stat-card.musnah{background: linear-gradient(135deg,rgba(255, 77, 77, 0.4),rgba(179, 0, 0, 0.3));
                      backdrop-filter: blur(12px);
                      -webkit-backdrop-filter: blur(12px);
                      border-radius: 15px;
                      border: 1px solid rgba(255,255,255,0.2);
                      color: white;}
    .stat-icon{font-size:50px;text-align:right;margin-bottom:10px}
    .stat-label{font-size:.78rem;color:#ffffff;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
    .stat-value{font-size:2rem;font-weight:800;color:#ffffff;line-height:1;margin-top:10px}
    .stat-sub{font-size:.75rem;color:#ffffff;}

    /* ── CHART CARD ── */
    .chart-card{background:#fff;border-radius:14px;padding:22px 24px 28px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:24px;}
    .chart-header{display:flex;align-items:flex-start;flex-wrap:wrap;gap:14px;margin-bottom:18px;}
    .chart-title{font-size:1rem;font-weight:700;color:#1e293b;flex:1;min-width:160px;padding-top:4px;}

    .chart-wrap{position:relative;height:340px;}

    /* ── TOGGLE BUTTONS ── */
    .filter-panel{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
    .toggle-btn{padding:6px 16px;border-radius:20px;border:2px solid #e2e8f0;background:#f8fafc;color:#475569;
      font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap;}
    .toggle-btn:hover{border-color:#6366f1;color:#6366f1;}
    .toggle-btn.active{background:#6366f1;border-color:#6366f1;color:#fff;}

    /* ── TABLE CARD ── */
    .dash-table-card{background:#fff;border-radius:14px;padding:22px 24px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:24px;}
    .dash-table-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
    .dash-table-title{font-size:1rem;font-weight:700;color:#1e293b;flex:1;}
    .dtw{overflow-x:auto;}
    .dtw table{width:100%;border-collapse:collapse;font-size:.82rem;}
    .dtw thead th{background:#f1f5f9;color:#475569;font-weight:700;padding:10px 12px;text-align:left;white-space:nowrap;}
    .dtw tbody tr:nth-child(even){background:#f8fafc;}
    .dtw tbody tr:hover{background:#eff6ff;}
    .dtw tbody td{padding:9px 12px;color:#334155;border-bottom:1px solid #f1f5f9;}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;}
    .badge-aktif{color:#16a34a;}
    .badge-inaktif{color:#ca8a04;}
    .badge-musnah{color:#dc2626;}
    .ls{text-align:center;padding:40px 0;color:#94a3b8;}
    .ls i{font-size:2rem;display:block;margin-bottom:8px;animation:sp 1s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg);}}
    @media(max-width:640px){.stat-value{font-size:1.5rem;}.chart-wrap{height:240px;}}
  </style>
</head>

<div class="container">

  <!-- STAT CARDS -->
  <div class="stat-grid">
    <div class="stat-card total">
      <span class="stat-value" id="cTotal">—</span>
      <span class="stat-icon"><i class="fa-solid fa-box-archive" style="color: rgba(229, 229, 229, 0.6);"></i></span>
      <span class="stat-label">Total Arsip</span>
      <span class="stat-sub">Semua data tersimpan</span>
    </div>
    <div class="stat-card aktif">
      <span class="stat-value" id="cAktif">—</span>
      <span class="stat-icon"><i class="fa-solid fa-road-circle-check" style="color: rgba(229, 229, 229, 0.6);"></i></span>
      <span class="stat-label">Aktif</span>
      <span class="stat-sub" id="pAktif">—% dari total</span>
    </div>
    <div class="stat-card inaktif">
      <span class="stat-value" id="cInaktif">—</span>
      <span class="stat-icon"><i class="fa-solid fa-pause" style="color: rgba(229, 229, 229, 0.6);"></i></span>
      <span class="stat-label">Inaktif</span>
      <span class="stat-sub" id="pInaktif">—% dari total</span>
    </div>
    <div class="stat-card musnah">
      <span class="stat-value" id="cMusnah">—</span>
      <span class="stat-icon"><i class="fa-solid fa-file-circle-xmark" style="color: rgba(229, 229, 229, 0.6);"></i></span>
      <span class="stat-label">Musnah</span>
      <span class="stat-sub" id="pMusnah">—% dari total</span>
    </div>
  </div>

  <!-- CHART CARD -->
  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-title">Grafik Distribusi Arsip</div>
      <div class="filter-panel">
        <button class="toggle-btn active" id="btnByKet"  onclick="gantiKat('keterangan')">Keterangan</button>
        <button class="toggle-btn"        id="btnByKlas" onclick="gantiKat('klasifikasi')">Kode Klasifikasi</button>
        <button class="toggle-btn"        id="btnByThn"  onclick="gantiKat('tahun')">Tahun</button>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="chartArsip"></canvas></div>
  </div>

  <!-- TABLE CARD -->
  <div class="dash-table-card">
    <div class="dash-table-header">
      <div class="dash-table-title">Ringkasan</div>
      <button class="btn btn-secondary" style="padding:6px 14px;font-size:.78rem;" onclick="Muat_Data()">
        <i class="fa-solid fa-arrows-rotate"></i> Refresh
      </button>
    </div>
    <div id="tblWrap">
      <div class="ls"><i class="fa-solid fa-arrows-rotate"></i>Menunggu sesi...</div>
    </div>
  </div>

<!-- SESSION HELPER -->
<?!= include('session-helper'); ?>

<script>
/* ── VARIABEL ── */
var semuaData = [];
var grafik    = null;
var katAktif  = 'keterangan';

var WARNA = ['#6366f1','#22c55e','#f59e0b','#ef4444','#3b82f6','#a855f7',
             '#14b8a6','#f97316','#ec4899','#0ea5e9','#84cc16','#e11d48'];

var KOL_MAP  = {keterangan:'Status Keterangan', klasifikasi:'Kode Klasifikasi', tahun:'Tahun'};
var JUDUL_MAP = {keterangan:'Ringkasan per Status Keterangan', klasifikasi:'Ringkasan per Kode Klasifikasi', tahun:'Ringkasan per Tahun'};

/* ── DIPANGGIL session-helper setelah sesi valid ── */
function _onSesiValid() { Muat_Data(); }

/* ────────────────────────────────────────────────────────
   MUAT DATA DARI SHEET
──────────────────────────────────────────────────────── */
function Muat_Data() {
  document.getElementById('tblWrap').innerHTML = '<div class="ls"><i class="fa-solid fa-arrows-rotate"></i>Memuat...</div>';
  ['cTotal','cAktif','cInaktif','cMusnah'].forEach(function(id){ document.getElementById(id).textContent = '—'; });

  google.script.run
    .withSuccessHandler(function(rows) {
      semuaData = rows || [];
      HitungStat();
      RenderGrafik(katAktif);
      RenderTabel(katAktif);
    })
    .withFailureHandler(function(err) {
      document.getElementById('tblWrap').innerHTML =
        '<div class="ls" style="color:#ef4444;">⚠️ ' + (err.message||'Error') + '</div>';
    })
    .getAll();
}

/* ────────────────────────────────────────────────────────
   HITUNG STATISTIK CARDS
──────────────────────────────────────────────────────── */
function HitungStat() {
  var tot = semuaData.length;
  var akt = semuaData.filter(function(b){ return b[12]==='Aktif'; }).length;
  var ina = semuaData.filter(function(b){ return b[12]==='Inaktif'; }).length;
  var mus = semuaData.filter(function(b){ return b[12]==='Musnah'; }).length;
  var p   = function(n){ return tot>0 ? Math.round(n/tot*100) : 0; };

  document.getElementById('cTotal').textContent   = tot;
  document.getElementById('cAktif').textContent   = akt;
  document.getElementById('cInaktif').textContent = ina;
  document.getElementById('cMusnah').textContent  = mus;
  document.getElementById('pAktif').textContent   = p(akt) + '% dari total';
  document.getElementById('pInaktif').textContent = p(ina) + '% dari total';
  document.getElementById('pMusnah').textContent  = p(mus) + '% dari total';
}

/* ────────────────────────────────────────────────────────
   GANTI KATEGORI
──────────────────────────────────────────────────────── */
function gantiKat(kat) {
  katAktif = kat;
  ['btnByKet','btnByKlas','btnByThn'].forEach(function(id){
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById({keterangan:'btnByKet', klasifikasi:'btnByKlas', tahun:'btnByThn'}[kat])
    .classList.add('active');
  RenderGrafik(kat);
  RenderTabel(kat);
}

/* ────────────────────────────────────────────────────────
   AMBIL NILAI KUNCI dari satu baris berdasarkan kategori
──────────────────────────────────────────────────────── */
function NilaiKunci(b, kat) {
  if (kat === 'keterangan')  return b[12] ? b[12].trim() : '(Kosong)';
  if (kat === 'klasifikasi') return b[3]  ? b[3].trim()  : '(Kosong)';
  if (kat === 'tahun') {
    var t = b[5] ? b[5].toString().trim() : '';
    return (t.length >= 4 && parseInt(t.slice(0,4)) > 1900) ? t.slice(0,4) : '(Tidak diketahui)';
  }
  return '';
}

/* ────────────────────────────────────────────────────────
   GRUP DATA → { label: count }
──────────────────────────────────────────────────────── */
function Grup(kat) {
  var r = {};
  semuaData.forEach(function(b) {
    var k = NilaiKunci(b, kat);
    r[k] = (r[k] || 0) + 1;
  });
  return r;
}

/* ────────────────────────────────────────────────────────
   RENDER GRAFIK BATANG
──────────────────────────────────────────────────────── */
function RenderGrafik(kat) {
  var g   = Grup(kat);
  var lbl = Object.keys(g).sort(function(a, b) {
    return kat === 'tahun' ? parseInt(a) - parseInt(b) : g[b] - g[a];
  });
  var val = lbl.map(function(l){ return g[l]; });
  var ctx = document.getElementById('chartArsip').getContext('2d');

  if (grafik) { grafik.destroy(); grafik = null; }

  grafik = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: lbl.length ? lbl : ['(Tidak ada data)'],
      datasets: [{
        label          : KOL_MAP[kat] || kat,
        data           : val.length ? val : [0],
        backgroundColor: lbl.map(function(_, i){ return WARNA[i % WARNA.length]; }),
        borderRadius   : 8,
        borderSkipped  : false,
        barPercentage  : 0.65
      }]
    },
    options: {
      responsive         : true,
      maintainAspectRatio: false,
      plugins: {
        legend : { display: false },
        tooltip: {
          callbacks: {
            label: function(c) {
              var base = semuaData.length;
              var p = base > 0 ? Math.round(c.raw / base * 100) : 0;
              return '  ' + c.raw + ' arsip (' + p + '%)';
            }
          }
        }
      },
      scales: {
        x: {
          grid : { display: false },
          ticks: { font: { family:'Plus Jakarta Sans', size:11, weight:'600' }, color:'#475569', maxRotation:35 }
        },
        y: {
          beginAtZero: true,
          grid : { color:'#f1f5f9' },
          ticks: { font: { family:'Plus Jakarta Sans', size:11 }, color:'#94a3b8', precision:0 }
        }
      }
    }
  });
}

/* ────────────────────────────────────────────────────────
   RENDER TABEL RINGKASAN
──────────────────────────────────────────────────────── */
function RenderTabel(kat) {
  var g   = Grup(kat);
  var tot = semuaData.length;

  var entries = Object.entries(g).sort(function(a, b) {
    return kat === 'tahun' ? parseInt(a[0]) - parseInt(b[0]) : b[1] - a[1];
  });

  if (!entries.length) {
    document.getElementById('tblWrap').innerHTML =
      '<div class="ls" style="color:#94a3b8;">Tidak ada data</div>';
    return;
  }

  var maxV = Math.max.apply(null, entries.map(function(e){ return e[1]; }));

  var html = '<div class="dtw"><table>'
    + '<thead><tr>'
    + '<th>No</th>'
    + '<th>' + Esc(KOL_MAP[kat]) + '</th>'
    + '<th style="text-align:right">Jumlah</th>'
    + '<th style="text-align:right">Persentase</th>'
    + '<th style="min-width:130px">Proporsi</th>'
    + '</tr></thead><tbody>';

  entries.forEach(function(en, i) {
    var lbl = en[0], cnt = en[1];
    var pct = tot > 0 ? (cnt / tot * 100).toFixed(1) : '0.0';
    var bar = maxV > 0 ? Math.round(cnt / maxV * 100) : 0;
    var w   = WARNA[i % WARNA.length];

    var lblH = Esc(lbl);
    if (kat === 'keterangan') {
      var bdg = lbl==='Aktif'?'badge-aktif' : lbl==='Inaktif'?'badge-inaktif' : lbl==='Musnah'?'badge-musnah' : '';
      if (bdg) lblH = '<span class="badge ' + bdg + '">' + Esc(lbl) + '</span>';
    }

    html += '<tr>'
      + '<td style="color:#94a3b8;font-weight:600;">' + (i+1) + '</td>'
      + '<td>' + lblH + '</td>'
      + '<td style="text-align:right;font-weight:700;color:#1e293b;">' + cnt + '</td>'
      + '<td style="text-align:right;color:#6366f1;font-weight:600;">' + pct + '%</td>'
      + '<td>'
      +   '<div style="background:#f1f5f9;border-radius:6px;overflow:hidden;height:9px;">'
      +     '<div style="width:' + bar + '%;height:9px;background:' + w + ';border-radius:6px;transition:width .4s;"></div>'
      +   '</div>'
      + '</td>'
      + '</tr>';
  });

  html += '<tr style="background:#f8fafc;font-weight:700;">'
    + '<td colspan="2" style="color:#1e293b;padding:10px 12px;">TOTAL</td>'
    + '<td style="text-align:right;color:#6366f1;padding:10px 12px;">' + tot + '</td>'
    + '<td style="text-align:right;color:#6366f1;padding:10px 12px;">100%</td>'
    + '<td></td>'
    + '</tr>';

  html += '</tbody></table></div>';
  document.getElementById('tblWrap').innerHTML = html;
}

/* ── ESCAPE HTML ── */
function Esc(s) {
  if (!s) return '';
  return s.toString()
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
