  <script>
    /* ── SEMUA DATA ── */
    var allStats = { sm: [], sk: [], sppd: [], am: [], arsip: [] };
    var grafik = null;
    var katAktif = 'keterangan';

    var WARNA = ['#6366f1', '#22c55e', '#f59e0b', '#ef4444', '#3b82f6', '#a855f7',
      '#14b8a6', '#f97316', '#ec4899', '#0ea5e9', '#84cc16', '#e11d48'];

    var NAMA_BULAN = ['', 'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
      'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

    /* ── HELPER: build card HTML ── */
    function buildBlankCardHtml(type, key, color, icon, onchangeFn, isArsip, extraClass) {
      extraClass = extraClass || '';
      var filterHtml = '';
      if (isArsip) {
        filterHtml = '<div class="mini-card-filters arsip-filters">'
          + '  <select class="mini-filter-sel klas-sel" onchange="' + onchangeFn + '"><option value="">Klasifikasi</option></select>'
          + '  <select class="mini-filter-sel year-sel" onchange="' + onchangeFn + '"><option value="">Tahun</option></select>'
          + '  <select class="mini-filter-sel month-sel" onchange="' + onchangeFn + '">'
          + '    <option value="">Bulan</option>'
          + '    <option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option><option value="04">Apr</option>'
          + '    <option value="05">Mei</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Ags</option>'
          + '    <option value="09">Sep</option><option value="10">Okt</option><option value="11">Nov</option><option value="12">Des</option>'
          + '  </select>'
          + '</div>';
      } else {
        filterHtml = '<div class="mini-card-filters">'
          + '  <select class="mini-filter-sel year-sel" onchange="' + onchangeFn + '"><option value="">Tahun</option></select>'
          + '  <select class="mini-filter-sel month-sel" onchange="' + onchangeFn + '">'
          + '    <option value="">Bulan</option>'
          + '    <option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option><option value="04">Apr</option>'
          + '    <option value="05">Mei</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Ags</option>'
          + '    <option value="09">Sep</option><option value="10">Okt</option><option value="11">Nov</option><option value="12">Des</option>'
          + '  </select>'
          + '</div>';
      }

      return '<div class="mini-card' + extraClass + '" data-type="' + type + '" data-key="' + key + '" style="--accent:' + color + '">'
        + '<div class="mini-card-header" style="justify-content:center;">'
        + '  <div class="mini-card-label" title="' + key + '" style="text-align:center;white-space:normal;">' + key + '</div>'
        + '</div>'
        + filterHtml
        + '<div class="mini-card-value-wrap">'
        + '  <div class="mini-card-count">—</div>'
        + '  <div class="mini-card-pct">—%</div>'
        + '</div>'
        + '<div class="mini-card-bar-wrap">'
        + '  <div class="mini-card-bar" style="width:0%;background:' + color + ';"></div>'
        + '</div>'
        + '</div>';
    }

    /* ── INIT BLANK CARDS PRE-LOAD ── */
    function initBlankCards() {
      // 1. Surat Masuk (9 cards)
      var smKeys = ['nota dinas', 'surat pengantar', 'surat biasa', 'surat keputusan', 'surat perintah tugas', 'berita acara', 'surat kontrak', 'surat penawaran', 'surat keterangan'];
      var smColors = ['#6366f1', '#8b5cf6', '#a855f7', '#ec4899', '#f43f5e', '#f97316', '#0ea5e9', '#14b8a6', '#22c55e'];
      var smHtml = '';
      smKeys.forEach(function (key, i) {
        smHtml += buildBlankCardHtml('sm', key, smColors[i], 'fa-solid fa-envelope-open-text', 'calculateAllSM()');
      });
      document.getElementById('smCards').innerHTML = smHtml;

      // 2. Surat Keluar (9 cards)
      var skHtml = '';
      smKeys.forEach(function (key, i) {
        skHtml += buildBlankCardHtml('sk', key, smColors[i], 'fa-solid fa-paper-plane', 'calculateAllSK()');
      });
      document.getElementById('skCards').innerHTML = skHtml;

      // 3. SPPD (kolom kiri) → #sppdCards
      var sppdHtml = '<div class="mini-card sppd-single-card" style="--accent:#3b82f6;">'
        + '<div class="mini-card-header" style="justify-content:center;">'
        + '  <div class="mini-card-label" style="text-align:center;">Total SPPD</div>'
        + '</div>'
        + '<div class="mini-card-filters">'
        + '  <select class="mini-filter-sel year-sel" onchange="renderSPPDCard()"><option value="">Tahun</option></select>'
        + '  <select class="mini-filter-sel month-sel" onchange="renderSPPDCard()">'
        + '    <option value="">Bulan</option>'
        + '    <option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option><option value="04">Apr</option>'
        + '    <option value="05">Mei</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Ags</option>'
        + '    <option value="09">Sep</option><option value="10">Okt</option><option value="11">Nov</option><option value="12">Des</option>'
        + '  </select>'
        + '</div>'
        + '<div class="mini-card-value-wrap">'
        + '  <div class="mini-card-count sppd-single-count">—</div>'
        + '</div>'
        + '</div>';
      document.getElementById('sppdCards').innerHTML = sppdHtml;

      // 4. Alih Media (kolom kanan) → #amCards
      var amKeys = ['PNBP', 'DIPA'];
      var amColors = ['#14b8a6', '#0ea5e9'];
      var amHtml = '';
      amKeys.forEach(function (key, i) {
        amHtml += buildBlankCardHtml('am', key, amColors[i], 'fa-solid fa-file-video', 'calculateAllAM()');
      });
      document.getElementById('amCards').innerHTML = amHtml;

      // 4. Arsip (3 cards)
      var arsipKeys = ['Aktif', 'Inaktif', 'Musnah'];
      var arsipColors = ['#22c55e', '#f59e0b', '#ef4444'];
      var arsipHtml = '';
      arsipKeys.forEach(function (key, i) {
        arsipHtml += buildBlankCardHtml('arsip', key, arsipColors[i], 'fa-solid fa-box-archive', 'calculateAllArsip()', true);
      });
      document.getElementById('arsipKetCards').innerHTML = arsipHtml;
    }

    /* ── INIT ── */
    function _onSesiValid() {
      initBlankCards();
      Muat_Data();
    }

    function Muat_Data() {
      google.script.run
        .withSuccessHandler(function (data) {
          allStats = data || { sm: [], sk: [], sppd: [], am: [], arsip: [] };
          isiDropdownTahun();
          calculateAllSM();
          calculateAllSK();
          calculateAllAM();
          calculateAllArsip();
          renderSPPDCard();
          RenderGrafik(katAktif);
        })
        .withFailureHandler(function (err) {
          ['smCards', 'skCards', 'sppdCards', 'amCards', 'arsipKetCards'].forEach(function (id) {
            document.getElementById(id).innerHTML = '<div class="ls" style="color:#ef4444;">⚠️ Gagal: ' + (err.message || 'Error') + '</div>';
          });
        })
        .getDashboardStats();
    }

    /* ── HELPER: ekstrak tahun/bulan dari string YYYY-MM-DD ── */
    function extractYear(s) {
      if (!s) return '';
      var m = s.toString().match(/^(\d{4})/);
      return m ? m[1] : '';
    }
    function extractMonth(s) {
      if (!s) return '';
      var m = s.toString().match(/^\d{4}-(\d{2})/);
      return m ? m[1] : '';
    }

    /* ── ISI DROPDOWN TAHUN ── */
    function isiDropdownTahun() {
      var tahunSets = {
        sm: new Set(), sk: new Set(), sppd: new Set(), am: new Set(), arsip: new Set()
      };

      allStats.sm.forEach(function (r) { var y = extractYear(r[4]); if (y) tahunSets.sm.add(y); });
      allStats.sk.forEach(function (r) { var y = extractYear(r[3]); if (y) tahunSets.sk.add(y); });
      allStats.sppd.forEach(function (r) {
        [r[6], r[7], r[8]].forEach(function (d) { var y = extractYear(d); if (y) tahunSets.sppd.add(y); });
      });
      allStats.am.forEach(function (r) { var y = extractYear(r[6]); if (y) tahunSets.am.add(y); });
      allStats.arsip.forEach(function (r) { var y = extractYear(r[5]); if (y) tahunSets.arsip.add(y); });

      function fillAllSels(selector, set) {
        var sortedYears = Array.from(set).sort().reverse();
        document.querySelectorAll(selector).forEach(function (sel) {
          var cur = sel.value;
          while (sel.options.length > 1) sel.remove(1);
          sortedYears.forEach(function (y) {
            var opt = document.createElement('option');
            opt.value = y; opt.textContent = y;
            sel.appendChild(opt);
          });
          if (cur) sel.value = cur;
        });
      }

      fillAllSels('.mini-card[data-type="sm"] .year-sel', tahunSets.sm);
      fillAllSels('.mini-card[data-type="sk"] .year-sel', tahunSets.sk);
      fillAllSels('.sppd-single-card .year-sel', tahunSets.sppd);
      fillAllSels('.mini-card[data-type="am"] .year-sel', tahunSets.am);
      fillAllSels('.mini-card[data-type="arsip"] .year-sel', tahunSets.arsip);

      var klasSet = new Set();
      allStats.arsip.forEach(function (r) { var k = (r[3] || '').trim(); if (k) klasSet.add(k); });
      var sortedKlas = Array.from(klasSet).sort();

      document.querySelectorAll('.mini-card[data-type="arsip"] .klas-sel').forEach(function (sel) {
        var cur = sel.value;
        while (sel.options.length > 1) sel.remove(1);
        sortedKlas.forEach(function (k) {
          var opt = document.createElement('option');
          opt.value = k; opt.textContent = k;
          sel.appendChild(opt);
        });
        if (cur) sel.value = cur;
      });
    }

    /* ── FILTER helper ── */
    function filterByTglYM(rows, colIdx, tahun, bulan) {
      return rows.filter(function (r) {
        var d = (r[colIdx] || '').toString();
        if (tahun && extractYear(d) !== tahun) return false;
        if (bulan && extractMonth(d) !== bulan) return false;
        return true;
      });
    }

    /* ── CALCULATE SURAT MASUK ── */
    function calculateAllSM() {
      var total = 0;
      var counts = {};
      var keys = ['nota dinas', 'surat pengantar', 'surat biasa', 'surat keputusan', 'surat perintah tugas', 'berita acara', 'surat kontrak', 'surat penawaran', 'surat keterangan'];

      keys.forEach(function (key) {
        var card = document.querySelector('.mini-card[data-type="sm"][data-key="' + key + '"]');
        if (!card) return;
        var tahun = card.querySelector('.year-sel').value;
        var bulan = card.querySelector('.month-sel').value;
        var rows = filterByTglYM(allStats.sm, 4, tahun, bulan);
        var cnt = rows.filter(function (r) { return (r[7] || '').toString().trim().toLowerCase() === key.toLowerCase(); }).length;
        counts[key] = cnt;
        total += cnt;
      });

      keys.forEach(function (key) {
        var card = document.querySelector('.mini-card[data-type="sm"][data-key="' + key + '"]');
        if (!card) return;
        var cnt = counts[key];
        var pct = total > 0 ? Math.round(cnt / total * 100) : 0;
        card.querySelector('.mini-card-count').textContent = cnt;
        card.querySelector('.mini-card-bar').style.width = pct + '%';
        card.querySelector('.mini-card-pct').textContent = pct + '%';
      });
    }

    /* ── CALCULATE SURAT KELUAR ── */
    function calculateAllSK() {
      var total = 0;
      var counts = {};
      var keys = ['nota dinas', 'surat pengantar', 'surat biasa', 'surat keputusan', 'surat perintah tugas', 'berita acara', 'surat kontrak', 'surat penawaran', 'surat keterangan'];

      keys.forEach(function (key) {
        var card = document.querySelector('.mini-card[data-type="sk"][data-key="' + key + '"]');
        if (!card) return;
        var tahun = card.querySelector('.year-sel').value;
        var bulan = card.querySelector('.month-sel').value;
        var rows = filterByTglYM(allStats.sk, 3, tahun, bulan);
        var cnt = rows.filter(function (r) { return (r[7] || '').toString().trim().toLowerCase() === key.toLowerCase(); }).length;
        counts[key] = cnt;
        total += cnt;
      });

      keys.forEach(function (key) {
        var card = document.querySelector('.mini-card[data-type="sk"][data-key="' + key + '"]');
        if (!card) return;
        var cnt = counts[key];
        var pct = total > 0 ? Math.round(cnt / total * 100) : 0;
        card.querySelector('.mini-card-count').textContent = cnt;
        card.querySelector('.mini-card-bar').style.width = pct + '%';
        card.querySelector('.mini-card-pct').textContent = pct + '%';
      });
    }

    /* ── CALCULATE ALIH MEDIA ── */
    function calculateAllAM() {
      var total = 0;
      var counts = {};
      var keys = ['PNBP', 'DIPA'];

      keys.forEach(function (key) {
        var card = document.querySelector('.mini-card[data-type="am"][data-key="' + key + '"]');
        if (!card) return;
        var tahun = card.querySelector('.year-sel').value;
        var bulan = card.querySelector('.month-sel').value;

        var rows = allStats.am.filter(function (r) {
          var d = (r[6] || '').toString();
          if (tahun && d.indexOf(tahun) === -1) return false;
          if (bulan) {
            var hasMonth = d.indexOf('-' + bulan) !== -1 || d.indexOf(bulan + '-') !== -1;
            if (!hasMonth) return false;
          }
          return true;
        });

        var cnt = rows.filter(function (r) { return (r[7] || '').toString().trim().toLowerCase() === key.toLowerCase(); }).length;
        counts[key] = cnt;
        total += cnt;
      });

      keys.forEach(function (key) {
        var card = document.querySelector('.mini-card[data-type="am"][data-key="' + key + '"]');
        if (!card) return;
        var cnt = counts[key];
        var pct = total > 0 ? Math.round(cnt / total * 100) : 0;
        card.querySelector('.mini-card-count').textContent = cnt;
        card.querySelector('.mini-card-bar').style.width = pct + '%';
        card.querySelector('.mini-card-pct').textContent = pct + '%';
      });
    }

    /* ── CALCULATE ARSIP PER KETERANGAN ── */
    function calculateAllArsip() {
      var total = 0;
      var counts = {};
      var keys = ['Aktif', 'Inaktif', 'Musnah'];

      keys.forEach(function (key) {
        var card = document.querySelector('.mini-card[data-type="arsip"][data-key="' + key + '"]');
        if (!card) return;
        var klas = card.querySelector('.klas-sel').value;
        var tahun = card.querySelector('.year-sel').value;
        var bulan = card.querySelector('.month-sel').value;

        var rows = allStats.arsip.filter(function (r) {
          if (klas && (r[3] || '').trim() !== klas) return false;
          if (tahun && extractYear(r[5] || '') !== tahun) return false;
          if (bulan && extractMonth(r[5] || '') !== bulan) return false;
          return true;
        });

        var cnt = rows.filter(function (r) { return (r[12] || '').toString().trim().toLowerCase() === key.toLowerCase(); }).length;
        counts[key] = cnt;
        total += cnt;
      });

      keys.forEach(function (key) {
        var card = document.querySelector('.mini-card[data-type="arsip"][data-key="' + key + '"]');
        if (!card) return;
        var cnt = counts[key];
        var pct = total > 0 ? Math.round(cnt / total * 100) : 0;
        card.querySelector('.mini-card-count').textContent = cnt;
        card.querySelector('.mini-card-bar').style.width = pct + '%';
        card.querySelector('.mini-card-pct').textContent = pct + '%';
      });
    }

    /* ── RENDER SPPD ── */
    function renderSPPDCard() {
      var card = document.querySelector('.sppd-single-card');
      if (!card) return;
      var tahun = card.querySelector('.year-sel').value;
      var bulan = card.querySelector('.month-sel').value;

      var rows = allStats.sppd.filter(function (r) {
        var dates = [r[6], r[7], r[8]];
        return dates.some(function (d) {
          if (tahun && extractYear(d || '') !== tahun) return false;
          if (bulan && extractMonth(d || '') !== bulan) return false;
          return true;
        });
      });
      if (!tahun && !bulan) rows = allStats.sppd;

      card.querySelector('.sppd-single-count').textContent = rows.length;
    }

    /* ── GRAFIK ARSIP ── */
    function gantiKat(kat) {
      katAktif = kat;
      ['btnByKet', 'btnByKlas', 'btnByThn'].forEach(function (id) {
        document.getElementById(id).classList.remove('active');
      });
      document.getElementById({ keterangan: 'btnByKet', klasifikasi: 'btnByKlas', tahun: 'btnByThn' }[kat])
        .classList.add('active');
      RenderGrafik(kat);
    }

    function NilaiKunci(b, kat) {
      if (kat === 'keterangan') return b[12] ? b[12].trim() : '(Kosong)';
      if (kat === 'klasifikasi') return b[3] ? b[3].trim() : '(Kosong)';
      if (kat === 'tahun') {
        var t = b[5] ? b[5].toString().trim() : '';
        return (t.length >= 4 && parseInt(t.slice(0, 4)) > 1900) ? t.slice(0, 4) : '(Tidak diketahui)';
      }
      return '';
    }

    function RenderGrafik(kat) {
      var data = allStats.arsip;
      var g = {};
      data.forEach(function (b) {
        var k = NilaiKunci(b, kat);
        g[k] = (g[k] || 0) + 1;
      });
      var lbl = Object.keys(g).sort(function (a, b) {
        return kat === 'tahun' ? parseInt(a) - parseInt(b) : g[b] - g[a];
      });
      var val = lbl.map(function (l) { return g[l]; });
      var ctx = document.getElementById('chartArsip').getContext('2d');
      if (grafik) { grafik.destroy(); grafik = null; }
      grafik = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: lbl.length ? lbl : ['(Tidak ada data)'],
          datasets: [{
            label: { keterangan: 'Keterangan', klasifikasi: 'Kode Klasifikasi', tahun: 'Tahun' }[kat] || kat,
            data: val.length ? val : [0],
            backgroundColor: lbl.map(function (_, i) { return WARNA[i % WARNA.length]; }),
            borderRadius: 8, borderSkipped: false, barPercentage: 0.65
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function (c) {
                  var base = data.length;
                  var p = base > 0 ? Math.round(c.raw / base * 100) : 0;
                  return '  ' + c.raw + ' arsip (' + p + '%)';
                }
              }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { family: 'Plus Jakarta Sans', size: 11, weight: '600' }, color: '#475569', maxRotation: 35 } },
            y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { family: 'Plus Jakarta Sans', size: 11 }, color: '#94a3b8', precision: 0 } }
          }
        }
      });
    }

    function Esc(s) { if (!s) return ''; return s.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
  </script>
</body>
