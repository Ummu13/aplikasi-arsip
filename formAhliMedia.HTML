  <script>
    var semuaData = [];
    var dataDisplay = [];
    var halamanAktif = 1;
    var perPage = 25;
    var currentFileHash = ''; // MD5 hash dari file yang diupload

    function _hitungMD5(file, callback) {
      var chunkSize = 2 * 1024 * 1024; // 2MB
      var spark = new SparkMD5.ArrayBuffer();
      var reader = new FileReader();
      var chunks = Math.ceil(file.size / chunkSize);
      var currentChunk = 0;
      reader.onload = function (e) {
        spark.append(e.target.result);
        currentChunk++;
        if (currentChunk < chunks) { loadNext(); }
        else { callback(spark.end()); }
      };
      reader.onerror = function () { callback(null); };
      function loadNext() {
        var start = currentChunk * chunkSize;
        var end = Math.min(start + chunkSize, file.size);
        reader.readAsArrayBuffer(file.slice(start, end));
      }
      loadNext();
    }

    function _onSesiValid() {
      Muat_Data();
    }

    function Muat_Data() {
      document.getElementById('tblBody').innerHTML = '<tr class="state-row"><td colspan="10"><i class="fa-solid fa-arrows-rotate"></i> Memuat data...</td></tr>';
      document.getElementById('subtitleTabel').textContent = 'Sedang Memuat Data...';
      google.script.run
        .withSuccessHandler(function (rows) {
          semuaData = dataDisplay = rows || [];
          Render_Tabel(dataDisplay);
          document.getElementById('subtitleTabel').textContent = 'Total ' + semuaData.length + ' data tersimpan';
        })
        .withFailureHandler(function (err) {
          document.getElementById('tblBody').innerHTML = '<tr class="state-row"><td colspan="10">Gagal memuat: ' + err.message + '</td></tr>';
        })
        .getAllAhliMedia();
    }

    function Render_Tabel(arr) {
      var tbody = document.getElementById('tblBody');
      if (!arr || arr.length === 0) {
        tbody.innerHTML = '<tr class="state-row"><td colspan="10">Tidak ada data</td></tr>';
        Upd_Info(0);
        document.getElementById('paginasiWrap').innerHTML = '';
        return;
      }

      var totalHalaman = Math.ceil(arr.length / perPage);
      if (halamanAktif > totalHalaman) halamanAktif = 1;

      var mulai = (halamanAktif - 1) * perPage;
      var selesai = Math.min(mulai + perPage, arr.length);
      var slice = arr.slice(mulai, selesai);

      var html = '';
      slice.forEach(function (b, i) {
        var idx = semuaData.indexOf(b);
        html += '<tr>'
          + '<td class="td-no">' + (Esc(b[0]) || '—') + '</td>'
          + '<td title="' + Esc(b[1]) + '">' + (Esc(b[1]) || '—') + '</td>'
          + '<td title="' + Esc(b[2]) + '">' + (Esc(b[2]) || '—') + '</td>'
          + '<td title="' + Esc(b[3]) + '">' + (Esc(b[3]) || '—') + '</td>'
          + '<td>' + (Esc(b[4]) || '—') + '</td>'
          + '<td>' + (Esc(b[5]) || '—') + '</td>'
          + '<td title="' + Esc(b[6]) + '">' + (Esc(b[6]) || '—') + '</td>'
          + '<td style="text-align:center;">' + (b[8] ? '<a href="' + Esc(b[8]) + '" target="_blank" style="color:var(--blue);font-weight:600;"><i class="fa-solid fa-link"></i></a>' : '<span style="color:#cbd5e1">—</span>') + '</td>'
          + '<td>' + (Esc(b[7]) || '—') + '</td>'
          + '<td class="td-aksi">'
          + '<button class="btn-tbl btn-tbl-view" title="Detail" onclick="viewData(' + idx + ')"><i class="fa-solid fa-eye"></i></button>'
          + '<button class="btn-tbl btn-tbl-edit" title="Edit" onclick="IsiFormEdit(' + idx + ')"><i class="fa-solid fa-pen-to-square"></i></button>'
          + '<button class="btn-tbl btn-tbl-hapus" title="Hapus" onclick="KonfirmasiHapus(' + idx + ')"><i class="fa-solid fa-trash"></i></button>'
          + '</td></tr>';
      });
      tbody.innerHTML = html;
      Upd_Info(arr.length, mulai + 1, selesai);
      Render_Paginasi(totalHalaman);
    }

    function Render_Paginasi(total) {
      var wrap = document.getElementById('paginasiWrap');
      if (total <= 1) { wrap.innerHTML = ''; return; }

      var html = '';
      var btnStyle = 'display:inline-flex;align-items:center;justify-content:center;'
        + 'min-width:32px;height:32px;padding:0 8px;border:1.5px solid var(--gray-200);'
        + 'border-radius:6px;background:var(--white);font-family:inherit;font-size:.8rem;'
        + 'font-weight:600;cursor:pointer;color:var(--gray-600);transition:all .15s;';
      var btnAktifStyle = btnStyle + 'background:#283289;color:white;border-color:#283289;';
      var btnDisabledStyle = btnStyle + 'opacity:.4;cursor:not-allowed;';

      if (halamanAktif > 1) {
        html += '<button style="' + btnStyle + '" onclick="keHalaman(' + (halamanAktif - 1) + ')">'
          + '<i class="fa-solid fa-chevron-left" style="font-size:.7rem"></i></button>';
      } else {
        html += '<button style="' + btnDisabledStyle + '" disabled>'
          + '<i class="fa-solid fa-chevron-left" style="font-size:.7rem"></i></button>';
      }

      var pages = rentangHalaman(halamanAktif, total);
      pages.forEach(function (p) {
        if (p === '...') {
          html += '<span style="padding:0 4px;color:var(--gray-400);font-size:.85rem;line-height:32px;">···</span>';
        } else {
          var st = (p === halamanAktif) ? btnAktifStyle : btnStyle;
          html += '<button style="' + st + '" onclick="keHalaman(' + p + ')">' + p + '</button>';
        }
      });

      if (halamanAktif < total) {
        html += '<button style="' + btnStyle + '" onclick="keHalaman(' + (halamanAktif + 1) + ')">'
          + '<i class="fa-solid fa-chevron-right" style="font-size:.7rem"></i></button>';
      } else {
        html += '<button style="' + btnDisabledStyle + '" disabled>'
          + '<i class="fa-solid fa-chevron-right" style="font-size:.7rem"></i></button>';
      }

      wrap.innerHTML = html;
    }

    function rentangHalaman(aktif, total) {
      if (total <= 7) {
        var r = [];
        for (var i = 1; i <= total; i++) r.push(i);
        return r;
      }
      var pages = [1];
      if (aktif > 3) pages.push('...');
      var dari = Math.max(2, aktif - 1);
      var sampai = Math.min(total - 1, aktif + 1);
      for (var j = dari; j <= sampai; j++) pages.push(j);
      if (aktif < total - 2) pages.push('...');
      pages.push(total);
      return pages;
    }

    function keHalaman(n) {
      halamanAktif = n;
      Render_Tabel(dataDisplay);
    }

    function gantiPerPage() {
      perPage = parseInt(document.getElementById('perPageSel').value);
      halamanAktif = 1;
      Render_Tabel(dataDisplay);
    }

    function filterTabel() {
      halamanAktif = 1;
      var q = document.getElementById('searchUniversal').value.toLowerCase().trim();
      var tgl = document.getElementById('searchTanggal').value;

      dataDisplay = semuaData.filter(function (b) {
        return (!q || b.some(function (s) { return s.toString().toLowerCase().includes(q); }))
          && (!tgl || (b[6] && b[6].toString().toLowerCase().includes(tgl.toLowerCase())));
      });
      var f = [];
      if (q) f.push('Pencarian: "' + q + '"');
      if (tgl) f.push('Bulan/Tahun: ' + tgl);

      document.getElementById('infoFilter').textContent = f.length ? f.join(' · ') : '';
      Render_Tabel(dataDisplay);
    }

    function clearSearch() {
      document.getElementById('searchUniversal').value = '';
      document.getElementById('searchTanggal').value = '';
      document.getElementById('infoFilter').textContent = '';
      dataDisplay = semuaData;
      Render_Tabel(dataDisplay);
    }

    function downloadDataAhli() {
      Swal.fire({
        title: `<div class ="card-headerh2"> 
                Unduh Daftar Arsip Alih Media
                </div>`,
        didOpen: function () {
          var titleEl = document.querySelector('.swal2-title');
          if (titleEl) {
            titleEl.style.paddingTop = '8px';
            titleEl.style.paddingBottom = '0';
            titleEl.style.marginBottom = '0';
          }
        },
        html: `
        <div class="form-grid2">
        <div class="form-group">
          <label>Pilih Format:</label>
            <select id="swal-format">
              <option value="xlsx">Excel (.xlsx)</option>
              <option value="pdf">PDF (.pdf)</option>
              <option value="docx">Word (.docx)</option>
            </select>
        </div>

        <div class="form-group">
          <label>Pilih Tahun:</label>
          <input type="text" id="swal-tahun" placeholder="Kosongkan untuk semua data...">
        <div>
        </div>

        `,
        focusConfirm: false,
        showCancelButton: true,
        confirmButtonText: 'Unduh',
        cancelButtonText: 'Batal',
        preConfirm: () => {
          return {
            fmt: document.getElementById('swal-format').value,
            thn: document.getElementById('swal-tahun').value.trim()
          }
        }
      }).then(function (result) {
        if (result.isConfirmed) {
          var param = result.value;

          Swal.fire({
            title: 'Menyiapkan File...',
            text: param.thn ? 'Filter: Tahun ' + param.thn : 'Pemrosesan Semua Data',
            allowOutsideClick: false,
            didOpen: function () { Swal.showLoading(); }
          });

          google.script.run
            .withSuccessHandler(function (res) {
              Swal.close();
              if (res && res.url) {
                window.open(res.url, '_blank');
                setTimeout(function () {
                  google.script.run.cleanupTempSheet(res.tempSheetId, res.tempDocId);
                }, 30000);
              } else {
                Swal.fire('Error', 'Gagal memproses file unduhan', 'error');
              }
            })
            .withFailureHandler(ErrH)
            .getDownloadUrlAhliMedia(param.thn, param.fmt);
        }
      });
    }

    function handleFileUpload(input) {
      if (!input.files || input.files.length === 0) return;
      var file = input.files[0];
      if (file.size > 10 * 1024 * 1024) {
        Swal.fire('Gagal', 'Ukuran file maksimal 10MB', 'error');
        input.value = '';
        return;
      }

      var statusEl = document.getElementById('uploadStatus');
      statusEl.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menghitung hash file...';
      statusEl.style.color = 'var(--blue)';

      _hitungMD5(file, function (hash) {
        currentFileHash = hash || '';
        statusEl.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sedang mengunggah: ' + file.name + '...';

        var reader = new FileReader();
        reader.onload = function (e) {
          var base64Data = e.target.result;
          google.script.run
            .withSuccessHandler(function (res) {
              if (res.success) {
                document.getElementById('LinkTautan').value = res.url;
                statusEl.innerHTML = '<i class="fa-solid fa-check"></i> Berhasil diunggah: ' + res.name;
                statusEl.style.color = 'var(--success)';
                Swal.fire({ icon: 'success', title: 'File Terunggah', text: 'Tautan file telah otomatis terisi.', timer: 1500, showConfirmButton: false });
              } else {
                statusEl.innerHTML = '<i class="fa-solid fa-xmark"></i> Gagal: ' + res.message;
                statusEl.style.color = 'var(--danger)';
                currentFileHash = '';
                Swal.fire('Gagal Unggah', res.message, 'error');
              }
            })
            .withFailureHandler(function (err) {
              statusEl.innerHTML = '<i class="fa-solid fa-xmark"></i> Error sistem';
              statusEl.style.color = 'var(--danger)';
              currentFileHash = '';
              ErrH(err);
            })
            .uploadFileToDrive(base64Data, file.name, file.type);
        };
        reader.readAsDataURL(file);
      });
    }

    function Simpan_Data() {
      var d = AmbilForm();
      if (!d.Jenis_Arsip) { Swal.fire({ icon: 'warning', title: 'Perhatian', text: 'Jenis Arsip wajib diisi!' }); return; }
      Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: function () { Swal.showLoading(); } });
      google.script.run
        .withSuccessHandler(function () { Swal.fire({ icon: 'success', title: 'Tersimpan!', timer: 1800, showConfirmButton: false }); Reset_Form(); Muat_Data(); })
        .withFailureHandler(ErrH).simpanAhliMedia(d);
    }

    var _viewIdx = -1;

    function viewData(idx) {
      var b = semuaData[idx];
      if (!b) return;
      _viewIdx = idx;

      function val(v) { return (v && v.toString().trim()) ? v.toString().trim() : null; }
      function set(id, v) {
        var el = document.getElementById(id);
        if (val(v)) {
          if (id === 'mvTautan') {
            el.innerHTML = '<a href="' + v + '" target="_blank" style="color:var(--blue);text-decoration:underline;">Buka File <i class="fa-solid fa-up-right-from-square" style="font-size:0.7rem"></i></a>';
          } else {
            el.textContent = v;
          }
          el.classList.remove('empty');
        } else {
          el.textContent = '-';
          el.classList.add('empty');
        }
      }



      set('mvJenis', b[1]);
      set('mvSemula', b[2]);
      set('mvMenjadi', b[3]);
      set('mvJumlah', b[4]);
      set('mvAlat', b[5]);
      set('mvWaktu', b[6]);
      set('mvTautan', b[8]);
      set('mvKeterangan', b[7]);

      document.getElementById('modalView').classList.add('aktif');
      document.body.style.overflow = 'hidden';
    }

    function tutupView() {
      document.getElementById('modalView').classList.remove('aktif');
      document.body.style.overflow = '';
      _viewIdx = -1;
    }

    document.getElementById('modalView').addEventListener('click', function (e) {
      if (e.target === this) tutupView();
    });

    function IsiFormEdit(idx) {
      var b = semuaData[idx]; if (!b) return;
      document.getElementById('editRowIndex').value = idx;
      ['JenisArsip', 'Semula', 'Menjadi', 'Jumlah', 'Alat', 'Waktu', 'Keterangan'].forEach(function (id, i) {
        var val = b[i + 1] || ''; // b uses 0-8 index, skip 0 (No)
        document.getElementById(id).value = val;
      });
      document.getElementById('LinkTautan').value = b[8] || '';
      document.getElementById('uploadStatus').textContent = (b[8] ? 'File sudah ada' : 'Maks. 10MB');
      currentFileHash = b[9] || ''; // Load existing hash dari data


      document.getElementById('btnKirim').style.display = 'none';
      document.getElementById('btnUpdate').style.display = 'inline-flex';
      document.getElementById('btnBatal').style.display = 'inline-flex';
      document.getElementById('btnClear').style.display = 'none';
      document.body.classList.add('edit-mode');
      document.getElementById('cardForm').scrollIntoView({ behavior: 'smooth' });
    }

    function Update_Data() {
      var idx = parseInt(document.getElementById('editRowIndex').value);
      if (idx < 0) return;
      var d = AmbilForm(); d.rowIndex = idx;
      if (!d.Jenis_Arsip) { Swal.fire({ icon: 'warning', title: 'Perhatian', text: 'Jenis Arsip wajib diisi!' }); return; }
      Swal.fire({ title: 'Mengupdate...', allowOutsideClick: false, didOpen: function () { Swal.showLoading(); } });
      google.script.run
        .withSuccessHandler(function () { Swal.fire({ icon: 'success', title: 'Diperbarui!', timer: 1800, showConfirmButton: false }); Batal_Edit(); Muat_Data(); })
        .withFailureHandler(ErrH).editDataAhliMedia(d);
    }

    function KonfirmasiHapus(idx) {
      var b = semuaData[idx]; if (!b) return;
      Swal.fire({
        icon: 'warning', title: 'Yakin Ingin Menghapus Data Ini?', html: 'Data <b>"' + (b[1] || 'ini') + '"</b> akan dihapus permanen.',
        showCancelButton: true, confirmButtonText: 'Hapus', cancelButtonText: 'Batal',
        confirmButtonColor: '#ef4444', cancelButtonColor: '#94a3b8'
      }).then(function (res) {
        if (!res.isConfirmed) return;
        Swal.fire({ title: 'Menghapus...', allowOutsideClick: false, didOpen: function () { Swal.showLoading(); } });
        google.script.run
          .withSuccessHandler(function () { Swal.fire({ icon: 'success', title: 'Dihapus!', timer: 1800, showConfirmButton: false }); Muat_Data(); })
          .withFailureHandler(ErrH).hapusDataAhliMedia(idx);
      });
    }

    function AmbilForm() {
      return {
        Jenis_Arsip: V('JenisArsip'), Semula: V('Semula'), Menjadi: V('Menjadi'),
        Jumlah: V('Jumlah'), Alat: V('Alat'), Waktu: V('Waktu'), Keterangan: V('Keterangan'),
        Link_Tautan: V('LinkTautan'), File_Hash: currentFileHash
      };
    }

    function V(id) { return document.getElementById(id).value.trim(); }
    function Esc(s) { if (!s) return ''; return s.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function Fmt_Tgl(s) { if (!s) return '—'; var p = s.toString().slice(0, 10).split('-'); return p.length === 3 && p[0].length === 4 ? p[2] + '/' + p[1] + '/' + p[0] : s; }

    function Upd_Info(n, dari, sampai) {
      var teks = dari && sampai
        ? 'Menampilkan ' + dari + '–' + sampai + ' dari ' + n + ' data'
        : 'Menampilkan 0 dari ' + semuaData.length + ' data';
      document.getElementById('infoJumlah').textContent = teks;
    }

    function Reset_Form() {
      ['JenisArsip', 'Semula', 'Menjadi', 'Jumlah', 'Alat', 'Waktu', 'Keterangan', 'LinkTautan'].forEach(function (id) { document.getElementById(id).value = ''; });
      document.getElementById('uploadStatus').textContent = 'Maks. 10MB';
      document.getElementById('uploadStatus').style.color = 'var(--gray-400)';
      currentFileHash = ''; // Reset hash tracking
    }

    function Batal_Edit() {
      document.getElementById('editRowIndex').value = -1;
      document.getElementById('btnKirim').style.display = 'inline-flex';
      document.getElementById('btnUpdate').style.display = 'none';
      document.getElementById('btnBatal').style.display = 'none';
      document.getElementById('btnClear').style.display = 'inline-flex';
      document.body.classList.remove('edit-mode');
      Reset_Form();
    }

    function ErrH(err) { Swal.fire({ icon: 'error', title: 'Error', text: err.message || 'Terjadi kesalahan.' }); }
  </script>
</body>

</html>
